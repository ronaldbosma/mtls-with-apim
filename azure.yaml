# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: mtls-with-apim
metadata:
  template: mtls-with-apim@0.0.0
infra:
  layers:
    - name: core
      path: ./infra/01-core
      hooks:
        postprovision:
          shell: pwsh
          run: ./hooks/postprovision-import-client-certificates.ps1
    - name: platform
      path: ./infra/02-platform
    - name: application
      path: ./infra/03-application
requiredVersions:
  azd: ">= 1.23.15" # azd version 1.23.15 or higher is required because we're using features from Bicep 0.42.1.
